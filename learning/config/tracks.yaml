  - id: ml
    name: "ML Models"
    subtitle: "LDA, BERT, and Beyond"
    priority: 3
    color: accent-ml
    detail_paths:
      - "personal_code/code/AI/NLP/nlp_roadmap.md"
      - "personal_code/code/practice/ML_and_AI/LEARNING_ROADMAP.md"
