    phases:
      - name: "Phase 1: Classical NLP"
        items:
          - name: "Bag of Words (BOW)"
            detail: "vectorize sentences in numpy"
            status: not_started
          - name: "TF-IDF"
            detail: "implement from scratch, compare with sklearn"
            status: not_started
          - name: "Naive Bayes Classifier"
            detail: "spam classifier from scratch"
            status: not_started
          - name: "LDA (Latent Dirichlet Allocation)"
            detail: "use gensim, read Blei 2003 paper"
            status: not_started
      - name: "Phase 2: From Counts to Meaning"
        items:
          - name: "Word Embeddings / word2vec"
            detail: "implement skip-gram from scratch"
            status: not_started
          - name: "GloVe"
            detail: "understand differences, use pretrained vectors"
            status: not_started
      - name: "Phase 3: Sequences"
        items:
          - name: "RNNs"
            detail: "character-level RNN from scratch (Karpathy makemore)"
            status: not_started
          - name: "LSTMs"
            detail: "implement in PyTorch, understand gates"
            status: not_started
      - name: "Phase 4: Attention & Transformers"
        items:
          - name: "Attention mechanism"
            detail: "scaled dot-product attention from scratch"
            status: done
          - name: "Transformer architecture"
            detail: "follow Karpathy nanoGPT"
            status: done
          - name: "BERT"
            detail: "fine-tune pretrained BERT on classification (HuggingFace)"
            status: not_started
          - name: "GPT"
            detail: "train on tiny shakespeare with nanoGPT"
            status: not_started
      - name: "Phase 5: Modern Practice"
        items:
          - name: "HuggingFace ecosystem"
            detail: "load, fine-tune, evaluate"
            status: not_started
          - name: "Fine-tuning + transfer learning"
            detail: "LoRA, adapters"
            status: not_started
          - name: "RAG"
            detail: "build a document Q&A system"
            status: not_started
